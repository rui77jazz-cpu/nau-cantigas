<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Chat do Repertório · Nau Cantigas</title>

  <style>
    body{
      margin:0;
      min-height:100vh;
      font-family: Georgia, serif;
      background:#efe5cf;
      color:#1f2f3a;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .card{
      width:100%;
      max-width:520px;
      background:#fff8e8;
      border:1px solid #c9b27c;
      border-radius:14px;
      box-shadow:0 10px 30px #0002;
      padding:24px;
    }

    h1{
      margin-top:0;
      color:#14324a;
      font-size:30px;
    }

    p{
      line-height:1.5;
    }

    input, button{
      width:100%;
      box-sizing:border-box;
      font-size:17px;
      padding:12px;
      margin:8px 0;
      border-radius:8px;
      border:1px solid #c9b27c;
      font-family: Georgia, serif;
    }

    button{
      background:#8a6b2f;
      color:white;
      cursor:pointer;
      font-weight:bold;
    }

    button:hover{
      filter:brightness(.95);
    }

    .hidden{
      display:none;
    }

    .error{
      color:#a33;
      font-weight:bold;
    }

    .ok{
      color:#1d6b3a;
      font-weight:bold;
    }

    a{
      color:#14324a;
      font-weight:bold;
    }
  </style>
</head>

<body>
  <main class="card">
    <h1>Chat do Repertório</h1>

    <section id="loginBox">
      <p>Área privada para os 4 participantes.</p>

      <input id="email" type="email" placeholder="Email">
      <input id="password" type="password" placeholder="Palavra-passe">

      <button id="loginBtn">Entrar</button>

      <p id="errorMsg" class="error"></p>

      <p>
        <a href="index.html">← Voltar às cantigas</a>
      </p>
    </section>

    <section id="appBox" class="hidden">
      <p class="ok">Entraste com sucesso.</p>
      <p>Utilizador:</p>
      <p><strong id="userEmail"></strong></p>

      <button id="logoutBtn">Sair</button>

      <p>
        <a href="index.html">← Voltar às cantigas</a>
      </p>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyMr7VwIcSxVx2MMjQCCODlc3znrTpX0",
      authDomain: "nau-cantigas.firebaseapp.com",
      projectId: "nau-cantigas",
      storageBucket: "nau-cantigas.firebasestorage.app",
      messagingSenderId: "261505196900",
      appId: "1:261505196900:web:31ca31af2c11f9d79ed071"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loginBox = document.getElementById("loginBox");
    const appBox = document.getElementById("appBox");
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const errorMsg = document.getElementById("errorMsg");
    const userEmail = document.getElementById("userEmail");

    loginBtn.addEventListener("click", async () => {
      errorMsg.textContent = "";

      try {
        await signInWithEmailAndPassword(
          auth,
          email.value.trim(),
          password.value
        );
      } catch (error) {
        errorMsg.textContent = "Não foi possível entrar. Confirma o email e a palavra-passe.";
        console.error(error);
      }
    });

    logoutBtn.addEventListener("click", async () => {
      await signOut(auth);
    });

    onAuthStateChanged(auth, (user) => {
      if (user) {
        loginBox.classList.add("hidden");
        appBox.classList.remove("hidden");
        userEmail.textContent = user.email;
      } else {
        loginBox.classList.remove("hidden");
        appBox.classList.add("hidden");
        userEmail.textContent = "";
      }
    });
  </script>
</body>
</html>
