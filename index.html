<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nau · Cantigas do Mar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0d1b2a;
    --navy:#13314e;
    --sea:#2f6f8f;
    --brass:#b6863f;
    --brass-soft:#e7d6b4;
    --parchment:#f5efe3;
    --parchment-2:#efe7d6;
    --paper:#fbf7ee;
    --muted:#6c6353;
    --line:#d9cdb4;
    --foam:#fffdf8;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Spectral',Georgia,serif;
    color:var(--ink);
    background:
      radial-gradient(1200px 600px at 80% -10%, #ffffff55, transparent 60%),
      linear-gradient(180deg, var(--parchment) 0%, var(--parchment-2) 100%);
    background-attachment:fixed;
    min-height:100vh;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- Header ---------- */
  header.masthead{
    position:relative;
    text-align:center;
    padding:38px 20px 0;
    background:linear-gradient(180deg,var(--navy),var(--ink));
    color:var(--paper);
    overflow:hidden;
  }
  .masthead .anchor{font-size:26px;color:var(--brass-soft);opacity:.85;letter-spacing:.3em;}
  .masthead h1{
    font-family:'Cormorant Garamond',serif;
    font-weight:600;
    font-size:clamp(48px,11vw,96px);
    letter-spacing:.14em;
    margin:.05em 0 0;
    color:var(--paper);
    text-shadow:0 2px 20px #00000040;
  }
  .masthead .tagline{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-size:clamp(18px,4.5vw,28px);
    color:var(--brass-soft);
    margin:0 0 4px;
    letter-spacing:.04em;
  }
  .masthead .sub{
    font-size:13px;letter-spacing:.22em;text-transform:uppercase;
    color:#cdd7df;opacity:.8;margin-bottom:28px;
  }
  .wave{display:block;width:100%;height:42px;margin-bottom:-1px;}

  /* ---------- Layout ---------- */
  .wrap{
    max-width:1120px;margin:0 auto;padding:26px 20px 80px;
    display:grid;grid-template-columns:300px 1fr;gap:30px;align-items:start;
  }
  /* ---------- Nav ---------- */
  nav.songlist{
    position:sticky;top:18px;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px;
    box-shadow:0 8px 30px #2a1e0410;
  }
  nav.songlist h2{
    font-family:'Cormorant Garamond',serif;font-weight:600;
    font-size:15px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--muted);margin:6px 10px 12px;
  }
  .nav-item{
    display:flex;gap:10px;align-items:baseline;
    width:100%;text-align:left;cursor:pointer;
    background:none;border:0;border-left:3px solid transparent;
    padding:9px 10px;border-radius:6px;
    font-family:'Spectral',serif;font-size:16px;color:var(--ink);
    transition:background .15s,border-color .15s;
  }
  .nav-item:hover{background:var(--parchment);}
  .nav-item .num{
    font-family:'Cormorant Garamond',serif;font-weight:600;
    color:var(--brass);min-width:20px;font-size:16px;
  }
  .nav-item.active{background:var(--parchment-2);border-left-color:var(--brass);font-weight:600;}
  .nav-item .t{line-height:1.25;}

  /* ---------- Content ---------- */
  main.stage{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:10px;
    padding:34px 38px 42px;
    box-shadow:0 10px 40px #2a1e0412;
    min-height:60vh;
  }
  .song-title{
    font-family:'Cormorant Garamond',serif;font-weight:600;
    font-size:clamp(32px,6vw,46px);line-height:1.05;
    color:var(--navy);margin:0;
  }
  .song-sub{
    font-style:italic;color:var(--muted);font-size:17px;margin:6px 0 0;
  }
  .rule{height:2px;background:linear-gradient(90deg,var(--brass),transparent);margin:18px 0 22px;border-radius:2px;}

  /* ---------- Audio ---------- */
  .players{display:flex;flex-direction:column;gap:14px;margin-bottom:30px;}
  .player{
    background:linear-gradient(180deg,var(--foam),var(--parchment));
    border:1px solid var(--line);border-radius:9px;padding:12px 14px;
  }
  .player .plabel{
    display:flex;align-items:center;gap:8px;
    font-family:'Cormorant Garamond',serif;font-weight:600;font-size:18px;
    color:var(--navy);margin-bottom:8px;letter-spacing:.02em;
  }
  .player .plabel .dot{width:8px;height:8px;border-radius:50%;background:var(--brass);}
  audio{width:100%;height:38px;}

  /* ---------- Lyrics ---------- */
  .toolbar{display:flex;justify-content:flex-end;gap:6px;margin-bottom:10px;}
  .toolbar button{
    border:1px solid var(--line);background:var(--paper);color:var(--muted);
    border-radius:6px;width:34px;height:30px;cursor:pointer;font-size:14px;
    font-family:'Spectral',serif;transition:background .15s;
  }
  .toolbar button:hover{background:var(--parchment);}
  .lyrics{font-size:var(--lyric-size,20px);transition:font-size .15s;}
  .stz{margin:0 0 1.05em;}
  .stz .ln{margin:0;}
  .refrain{
    border-left:3px solid var(--brass);
    background:linear-gradient(90deg,#b6863f12,transparent);
    padding:.5em .9em;border-radius:0 6px 6px 0;margin:0 0 1.05em;
  }
  .refrain .ln{font-weight:600;color:var(--navy);}
  .note{color:var(--muted);font-style:italic;font-size:.82em;margin:0 0 1.05em;}
  .subhead{
    font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.15em;
    color:var(--brass);letter-spacing:.04em;margin:.4em 0 .5em;
    border-bottom:1px dotted var(--line);padding-bottom:.2em;
  }
  .credit{margin-top:26px;padding-top:14px;border-top:1px solid var(--line);
    font-style:italic;color:var(--muted);font-size:14px;}

  footer{text-align:center;color:var(--muted);font-size:13px;padding:30px 20px 40px;letter-spacing:.05em;}
  footer .anchor{color:var(--brass);}

  /* ---------- Mobile ---------- */
  @media (max-width:820px){
    .wrap{grid-template-columns:1fr;gap:16px;padding:16px 12px 60px;}
    nav.songlist{position:static;}
    main.stage{padding:24px 20px 30px;}
    .nav-item{font-size:17px;padding:11px 10px;}
  }
</style>
</head>
<body>

<header class="masthead">
  <div class="anchor">⚓</div>
  <h1>NAU</h1>
  <p class="tagline">Cantigas do Mar</p>
  <p class="sub">Repertório · Feira Pirata de Leça da Palmeira</p>
  <svg class="wave" viewBox="0 0 1200 42" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,20 C150,40 300,0 450,18 C600,36 750,4 900,20 C1050,36 1150,12 1200,18 L1200,42 L0,42 Z" fill="#f5efe3"/>
  </svg>
</header>

<div class="wrap">
  <nav class="songlist" id="nav">
    <h2>Cantigas</h2>
  </nav>

  <main class="stage" id="stage"></main>
</div>

<footer>
  <span class="anchor">⚓</span>&nbsp; Nau · Cantigas do Mar
</footer>

/* ---------------- Render ---------------- */
const nav = document.getElementById("nav");
const stage = document.getElementById("stage");
let lyricSize = 20;
try{ const s = localStorage.getItem("nau-lyric-size"); if(s) lyricSize = parseInt(s,10); }catch(e){}

songs.forEach((s,i)=>{
  const b = document.createElement("button");
  b.className = "nav-item";
  b.dataset.id = s.id;
  b.innerHTML = `<span class="num">${i+1}</span><span class="t">${s.title}</span>`;
  b.addEventListener("click", ()=>select(s.id,true));
  nav.appendChild(b);
});

function esc(t){return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function renderBlocks(blocks){
  return blocks.map(bl=>{
    if(bl.type==="subhead") return `<div class="subhead">${esc(bl.text)}</div>`;
    const lns = bl.lines.map(l=>`<p class="ln">${esc(l)}</p>`).join("");
    if(bl.type==="refrain") return `<div class="refrain">${lns}</div>`;
    if(bl.type==="note") return `<div class="note">${lns}</div>`;
    return `<div class="stz">${lns}</div>`;
  }).join("");
}

function select(id, scroll){
  const s = songs.find(x=>x.id===id);
  if(!s) return;
  document.querySelectorAll(".nav-item").forEach(n=>n.classList.toggle("active", n.dataset.id===id));

  const players = s.audios.map(a=>`
    <div class="player">
      <div class="plabel"><span class="dot"></span>${esc(a.label)}</div>
      <audio controls preload="none" src="${a.file}"></audio>
    </div>`).join("");

  stage.innerHTML = `
    <h1 class="song-title">${esc(s.title)}</h1>
    ${s.sub?`<p class="song-sub">${esc(s.sub)}</p>`:""}
    <div class="rule"></div>
    <div class="players">${players}</div>
    <div class="toolbar">
      <button id="dec" title="Letra menor">A−</button>
      <button id="inc" title="Letra maior">A+</button>
    </div>
    <div class="lyrics" style="--lyric-size:${lyricSize}px">${renderBlocks(s.blocks)}</div>
    ${s.credit?`<div class="credit">${esc(s.credit)}</div>`:""}
  `;

  const ly = stage.querySelector(".lyrics");
  const apply=()=>{ ly.style.setProperty("--lyric-size", lyricSize+"px"); try{localStorage.setItem("nau-lyric-size",lyricSize);}catch(e){} };
  stage.querySelector("#inc").addEventListener("click",()=>{ lyricSize=Math.min(34,lyricSize+2); apply(); });
  stage.querySelector("#dec").addEventListener("click",()=>{ lyricSize=Math.max(15,lyricSize-2); apply(); });

  if(scroll && window.matchMedia("(max-width:820px)").matches){
    stage.scrollIntoView({behavior:"smooth", block:"start"});
  }
  try{ history.replaceState(null,"","#"+id); }catch(e){}
}

const start = (location.hash||"").replace("#","");
select(songs.some(s=>s.id===start)?start:songs[0].id, false);
</script>
</body>
</html>
